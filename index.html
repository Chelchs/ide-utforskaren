  <!DOCTYPE html>
  <html lang="sv">
  <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Idéutforskaren</title>
      <link rel="stylesheet" href="style.css">
  </head>
  <body>
      <main>
          <section class="hero">
              <h1>Idéutforskaren</h1>
              <p>De bästa idéerna gömmer sig ofta i vardagen — i saker som irriterar dig, saker du önskar fanns, eller
  saker du gör utan att tänka på det. Svara på frågorna nedan. Skriv det som kommer upp, det behöver inte vara
  perfekt.</p>
          </section>

          <form id="idea-form">
              <div class="question-card">
                  <label for="q1">Vad irriterar dig i vardagen? Något som borde vara enklare, smidigare eller bara
  fungera bättre?</label>
                  <textarea id="q1" name="q1" rows="4" placeholder="Skriv fritt..."></textarea>
              </div>

              <div class="question-card">
                  <label for="q2">Finns det något du önskar att du kunde köpa eller använda — men som inte verkar
  finnas?</label>
                  <textarea id="q2" name="q2" rows="4" placeholder="Skriv fritt..."></textarea>
              </div>

              <div class="question-card">
                  <label for="q3">Vad är du bra på eller vet mycket om — saker folk frågar dig om råd kring?</label>
                  <textarea id="q3" name="q3" rows="4" placeholder="Skriv fritt..."></textarea>
              </div>

              <div class="question-card">
                  <label for="q4">Vilka appar, tjänster eller produkter använder du ofta? Finns det något du saknar i
  dem?</label>
                  <textarea id="q4" name="q4" rows="4" placeholder="Skriv fritt..."></textarea>
              </div>

              <div class="question-card">
                  <label for="q5">Om du fick obegränsad tid och pengar — vad skulle du bygga eller skapa?</label>
                  <textarea id="q5" name="q5" rows="4" placeholder="Skriv fritt..."></textarea>
              </div>

              <button type="submit" id="submit-btn">Skicka svar</button>
              <p id="status-message" class="status" hidden></p>
          </form>
      </main>

      <script src="app.js"></script>
  </body>
  </html>
